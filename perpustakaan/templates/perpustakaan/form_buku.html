{% extends 'perpustakaan/base.html' %}
{% block content %}
<h2 class="text-2xl font-bold text-slate-800 mb-6">{{ aksi }} Buku</h2>

<form method="POST" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 max-w-4xl grid grid-cols-2 gap-6">
    {% csrf_token %}
    <div>
        <label class="text-xs font-semibold text-slate-600 block mb-2">Judul Buku</label>
        <input type="text" name="judul" value="{{ buku.judul }}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500" required>
    </div>
    <div>
        <label class="text-xs font-semibold text-slate-600 block mb-2">Pengarang</label>
        <input type="text" name="pengarang" value="{{ buku.pengarang }}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500" required>
    </div>
    <div>
        <label class="text-xs font-semibold text-slate-600 block mb-2">Kategori</label>
        <select name="kategori" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500">
            <option value="Novel" {% if buku.kategori == 'Novel' %}selected{% endif %}>Novel</option>
            <option value="Edukasi" {% if buku.kategori == 'Edukasi' %}selected{% endif %}>Edukasi</option>
            <option value="Sains" {% if buku.kategori == 'Sains' %}selected{% endif %}>Sains</option>
        </select>
    </div>
    <div>
        <label class="text-xs font-semibold text-slate-600 block mb-2">Penerbit</label>
        <input type="text" name="penerbit" value="{{ buku.penerbit }}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500" required>
    </div>
    <div>
        <label class="text-xs font-semibold text-slate-600 block mb-2">Tahun Terbit</label>
        <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit }}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500" required>
    </div>
    <div>
        <label class="text-xs font-semibold text-slate-600 block mb-2">Stok</label>
        <input type="number" name="stok" value="{{ buku.stok }}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500" required>
    </div>
    <div>
        <label class="text-xs font-semibold text-slate-600 block mb-2">ISBN</label>
        <input type="text" name="isbn" value="{{ buku.isbn }}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500" required>
    </div>
    <div>
        <label class="text-xs font-semibold text-slate-600 block mb-2">Rak / Lokasi</label>
        <input type="text" name="rak_lokasi" value="{{ buku.rak_lokasi }}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500" required>
    </div>
    <div class="col-span-2">
        <label class="text-xs font-semibold text-slate-600 block mb-2">Deskripsi</label>
        <textarea name="deskripsi" rows="4" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm outline-none focus:border-blue-500">{{ buku.deskripsi }}</textarea>
    </div>
    <div class="col-span-2 flex justify-end space-x-3 mt-4">
        <a href="{% url 'daftar_buku' %}" class="px-5 py-2.5 text-sm font-semibold border border-slate-200 rounded-xl hover:bg-slate-50 transition">Batal</a>
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition">Perbarui Buku</button>
    </div>
</form>
{% endblock %}
