{% extends 'perpustakaan/base.html' %}
{% block content %}
<div class="mb-6 flex items-center gap-3">
    <a href="{% url 'daftar_user' %}" class="p-1.5 text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-full transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
    </a>
    <div>
        <p class="text-[11px] text-slate-400 font-medium tracking-wide">Kelola User</p>
        <h2 class="text-xl font-bold text-slate-900 -mt-0.5">{% if user_member %}Edit{% else %}Tambah{% endif %} User</h2>
    </div>
</div>

<div class="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100 max-w-3xl">
    <form method="POST">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-x-5 gap-y-4">
            <div>
                <label class="text-xs font-semibold text-slate-700 block mb-1.5">Nama</label>
                <input type="text" name="nama" value="{{ user_member.nama|default:'' }}" placeholder="Roni" required class="w-full bg-slate-50/80 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-blue-500 focus:bg-white transition">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-700 block mb-1.5">Kelas</label>
                <input type="text" name="kelas" value="{{ user_member.kelas|default:'' }}" placeholder="XI IPA 1" required class="w-full bg-slate-50/80 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-blue-500 focus:bg-white transition">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-700 block mb-1.5">NIS</label>
                <input type="text" name="nis" value="{{ user_member.nis|default:'' }}" placeholder="2026001" required class="w-full bg-slate-50/80 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-blue-500 focus:bg-white transition">
            </div>
            <div>
                <label class="text-xs font-semibold text-slate-700 block mb-1.5">Status</label>
                <select name="status" class="w-full bg-slate-50/80 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-blue-500 focus:bg-white transition">
                    <option value="Aktif" {% if user_member.status == 'Aktif' %}selected{% endif %}>Aktif</option>
                    <option value="Nonaktif" {% if user_member.status == 'Nonaktif' %}selected{% endif %}>Nonaktif</option>
                </select>
            </div>
            <div class="col-span-2 flex justify-end items-center gap-3 mt-4">
                <a href="{% url 'daftar_user' %}" class="bg-white hover:bg-slate-50 text-slate-600 text-sm font-semibold px-5 py-2.5 rounded-xl border border-slate-200 transition">Batal</a>
                <button type="submit" class="bg-[#2563eb] hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2.5 rounded-xl shadow-sm transition">{% if user_member %}Perbarui{% else %}Simpan{% endif %} User</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
