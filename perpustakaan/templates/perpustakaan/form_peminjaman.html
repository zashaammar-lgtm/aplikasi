{% extends 'perpustakaan/base.html' %}
{% block content %}
<div class="mb-6 flex items-center gap-3">
    <a href="{% url 'daftar_peminjaman' %}" class="p-1.5 text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-full transition duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
        </svg>
    </a>
    <div>
        <p class="text-[11px] text-slate-400 font-medium tracking-wide">Peminjaman Buku</p>
        <h2 class="text-xl font-bold text-slate-900 -mt-0.5">Pinjam Buku</h2>
    </div>
</div>

<div class="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100/50 max-w-3xl">
    <form method="POST">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-x-5 gap-y-4">
            
            <div>
                <label class="text-xs font-semibold text-slate-700 block mb-1.5">Nama Peminjam</label>
                <input type="text" name="peminjam" placeholder="Sinta - XI IPS 2 (2026002)" required 
                       class="w-full bg-slate-50/80 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-blue-500 focus:bg-white transition duration-200">
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-700 block mb-1.5">Pilih Buku</label>
                <div class="relative">
                    <select name="buku" required 
                            class="w-full bg-slate-50/80 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-blue-500 focus:bg-white transition duration-200 appearance-none pr-10">
                        <option value="" disabled selected>-- Pilih Buku --</option>
                        {% for b in daftar_buku %}
                        <option value="{{ b.pk }}">{{ b.judul }} ({{ b.stok }} stok)</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5H7z"/></svg>
                    </div>
                </div>
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-700 block mb-1.5">Tanggal Pinjam</label>
                <input type="date" name="tanggal_pinjam" required 
                       class="w-full bg-slate-50/80 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-blue-500 focus:bg-white transition duration-200">
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-700 block mb-1.5">Tanggal Jatuh Tempo</label>
                <input type="date" name="jatuh_tempo" required 
                       class="w-full bg-slate-50/80 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-blue-500 focus:bg-white transition duration-200">
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-700 block mb-1.5">Keperluan</label>
                <div class="relative">
                    <select name="keperluan" required 
                            class="w-full bg-slate-50/80 border border-slate-200 text-slate-800 text-sm rounded-xl px-4 py-2.5 outline-none focus:border-blue-500 focus:bg-white transition duration-200 appearance-none pr-10">
                        <option value="Bacaan pribadi">Bacaan pribadi</option>
                        <option value="Tugas sekolah">Tugas sekolah</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5H7z"/></svg>
                    </div>
                </div>
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-700 block mb-1.5">Petugas</label>
                <input type="text" value="Budi Siregar" readonly 
                       class="w-full bg-slate-50/50 border border-slate-200 text-slate-400 text-sm rounded-xl px-4 py-2.5 outline-none cursor-not-allowed">
            </div>

            <div class="col-span-2">
                <label class="text-xs font-semibold text-slate-700 block mb-1.5">Catatan</label>
                <textarea name="catatan" rows="4" placeholder="Contoh: buku untuk tugas Bahasa Indonesia" 
                          class="w-full bg-slate-50/30 border-2 border-blue-400 focus:border-blue-500 text-slate-800 text-sm rounded-2xl p-4 outline-none ring-4 ring-blue-50/60 placeholder-slate-400 transition duration-200 resize-none"></textarea>
            </div>

            <div class="col-span-2 flex justify-end items-center gap-3 mt-4">
                <a href="{% url 'daftar_peminjaman' %}" 
                   class="bg-white hover:bg-slate-50 text-slate-600 text-sm font-semibold px-5 py-2.5 rounded-xl border border-slate-200 transition duration-150">
                    Batal
                </a>
                <button type="submit" 
                        class="bg-[#2563eb] hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2.5 rounded-xl shadow-sm transition duration-150">
                    Pinjam Buku
                </button>
            </div>

        </div>
    </form>
</div>
{% endblock %}
